<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Salud</title>
<style>
:root {
  --red: #C0392B; --red-light: #FADBD8;
  --orange: #E67E22; --orange-light: #FDEBD0;
  --green: #1E8449; --green-light: #D5F5E3;
  --blue: #2471A3; --blue-light: #D6EAF8;
  --gray: #5D6D7E;
  --text: #1C2833; --text-muted: #717D7E;
  --border: #E5E8E8; --bg: #F4F6F7; --white: #FFFFFF;
  --radius: 14px; --radius-sm: 8px;
  --nav-h: 64px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: var(--nav-h); }

header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0.9rem 1.25rem 0.7rem; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
.header-left .header-title { font-size: 17px; font-weight: 600; }
.header-left .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
.sync-btn:active { background: var(--bg); }
.sync-icon { font-size: 14px; display: inline-block; }
.sync-icon.spinning { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #1C2833; color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--white); border-top: 1px solid var(--border); display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; padding: 8px 4px; border: none; background: none; color: var(--text-muted); font-size: 10px; font-family: inherit; }
.nav-item.active { color: var(--blue); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--blue); display: none; }
.nav-item.active .nav-dot { display: block; }

.page { display: none; padding: 0 0 1rem; }
.page.active { display: block; }

.summary-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
.stat { background: var(--white); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; border: 1px solid var(--border); }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.stat-val { font-size: 19px; font-weight: 600; line-height: 1; }
.danger { color: var(--red); } .warning { color: var(--orange); } .ok { color: var(--green); } .neutral { color: var(--gray); } .info { color: var(--blue); }

.legend { padding: 0 12px 8px; display: flex; gap: 10px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

.date-divider { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px 4px; }

.records { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.record-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 4px; align-items: start; }
.record-pressure { font-size: 26px; font-weight: 700; line-height: 1; letter-spacing: -0.5px; }
.record-pressure span { font-size: 13px; font-weight: 400; color: var(--text-muted); margin-left: 2px; }
.record-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.record-comment { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 3px; }
.record-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-danger { background: var(--red-light); color: var(--red); }
.badge-warning { background: var(--orange-light); color: var(--orange); }
.badge-ok { background: var(--green-light); color: var(--green); }
.badge-info { background: var(--blue-light); color: var(--blue); }
.btn-delete { background: none; border: none; cursor: pointer; color: var(--border); font-size: 16px; padding: 2px; }
.btn-delete:active { color: var(--red); }

.date-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--white); border-bottom: 1px solid var(--border); }
.date-nav-btn { background: none; border: none; font-size: 26px; cursor: pointer; color: var(--blue); padding: 4px 10px; line-height: 1; }
.date-nav-label { font-size: 15px; font-weight: 600; color: var(--text); }

.liq-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 12px; }
.liq-stat { background: var(--white); border-radius: var(--radius-sm); padding: 10px 12px; border: 1px solid var(--border); }
.liq-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.liq-stat-val { font-size: 18px; font-weight: 600; }
.prog-wrap { height: 5px; background: var(--border); border-radius: 3px; margin-top: 6px; }
.prog-fill { height: 100%; border-radius: 3px; }

.toma-list { padding: 0 12px; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.toma-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.toma-name { font-size: 14px; font-weight: 500; color: var(--text); }
.toma-num { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.toma-ml { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; }
.toma-eq { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.bar-wrap { width: 48px; height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; margin-left: auto; }
.bar-fill { height: 100%; border-radius: 2px; }

.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; line-height: 1.6; }

.fab { position: fixed; bottom: calc(var(--nav-h) + 1rem); right: 1.25rem; width: 54px; height: 54px; border-radius: 50%; background: var(--blue); color: white; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(36,113,163,0.4); z-index: 15; }
.fab:active { transform: scale(0.94); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 30; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; padding: 1.25rem; padding-bottom: calc(1.25rem + env(safe-area-inset-bottom)); max-height: 92vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1rem; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea { width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--white); font-family: inherit; -webkit-appearance: none; appearance: none; }
.field input:focus, .field select:focus { outline: none; border-color: var(--blue); }
.field textarea { resize: none; height: 65px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-save { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; font-family: inherit; }
.btn-save:active { background: #1A5276; }
.btn-cancel { width: 100%; padding: 11px; background: none; color: var(--text-muted); border: none; font-size: 14px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="header-left">
    <div class="header-title">💊 Mi Salud</div>
    <div class="header-sub" id="header-sub">Cargando...</div>
  </div>
  <button class="sync-btn" onclick="syncAll()" id="sync-btn">
    <span class="sync-icon" id="sync-icon">☁️</span> Sincronizar
  </button>
</header>

<div class="page active" id="page-presion">
  <div class="summary-strip" id="bp-summary"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Alta ≥140/90</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Elevada 130-139</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Normal &lt;130/80</div>
  </div>
  <div id="bp-records"></div>
</div>

<div class="page" id="page-liquidos">
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDay(-1)">&#8249;</button>
    <div class="date-nav-label" id="liq-date-label">—</div>
    <button class="date-nav-btn" onclick="changeDay(1)">&#8250;</button>
  </div>
  <div class="liq-summary" id="liq-summary"></div>
  <div class="toma-list" id="liq-records"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modal-bp" onclick="handleOverlay(event,'modal-bp')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nueva medición</div>
    <div class="field-row">
      <div class="field"><label>Fecha</label><input type="date" id="bp-date"></div>
      <div class="field"><label>Hora</label><input type="time" id="bp-time"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Sistólica</label><input type="number" id="bp-sys" placeholder="120" inputmode="numeric"></div>
      <div class="field"><label>Diastólica</label><input type="number" id="bp-dia" placeholder="80" inputmode="numeric"></div>
    </div>
    <div class="field"><label>Método</label>
      <select id="bp-method">
        <option>Brazalete digital</option>
        <option>Muñeca digital</option>
        <option>Manual</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="field"><label>Comentarios</label><textarea id="bp-comment" placeholder="ej. En reposo, después de medicamento..."></textarea></div>
    <button class="btn-save" onclick="saveBP()">Guardar</button>
    <button class="btn-cancel" onclick="closeModal('modal-bp')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-liq" onclick="handleOverlay(event,'modal-liq')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Registrar líquido</div>
    <div class="field-row">
      <div class="field"><label>Fecha</label><input type="date" id="liq-date-input"></div>
      <div class="field"><label># Toma</label><input type="number" id="liq-toma" placeholder="1" inputmode="numeric"></div>
    </div>
    <div class="field"><label>Bebida</label>
      <select id="liq-type">
        <option value="agua">Agua natural</option>
        <option value="agua_splash">Agua + SplashH2O</option>
        <option value="cafe">Café</option>
        <option value="te">Té</option>
        <option value="proteina">GC Complete Melaleuca</option>
        <option value="colageno">Colágeno en agua</option>
        <option value="refresco">Refresco (Coca, Sprite, etc.)</option>
        <option value="cerveza">Cerveza Pacífico Light</option>
        <option value="jugo">Jugo natural</option>
        <option value="leche">Leche</option>
        <option value="otro">Otro</option>
      </select>
    </div>
    <div class="field"><label>Cantidad (ml)</label><input type="number" id="liq-ml" placeholder="240" inputmode="numeric"></div>
    <button class="btn-save" onclick="saveLiq()">Guardar</button>
    <button class="btn-cancel" onclick="closeModal('modal-liq')">Cancelar</button>
  </div>
</div>

<nav>
  <button class="nav-item active" onclick="showPage('presion')" id="nav-presion">
    <span class="nav-icon">❤️</span>
    <span>Presión</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="showPage('liquidos')" id="nav-liquidos">
    <span class="nav-icon">💧</span>
    <span>Líquidos</span>
    <div class="nav-dot"></div>
  </button>
</nav>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxv30XxqrQO2nCrIfC20BNV_UyH9A6bMFLCK69y74Pud-49mCE-LOhzLY37OUwgMjg/exec';
const BP_KEY = 'salud_bp_v1';
const LIQ_KEY = 'salud_liq_v1';

const HYDRO = { agua:1, agua_splash:1, cafe:0.8, te:0.85, proteina:0.875, colageno:0.9, refresco:0.7, cerveza:0.6, jugo:0.85, leche:0.9, otro:0.75 };
const HYDRO_LABEL = { agua:'Agua natural', agua_splash:'Agua + SplashH2O', cafe:'Café', te:'Té', proteina:'GC Complete', colageno:'Colágeno', refresco:'Refresco', cerveza:'Pacífico Light', jugo:'Jugo natural', leche:'Leche', otro:'Otro' };

const INITIAL_BP = [
  {id:1,date:'2026-06-10',time:'14:20',sys:150,dia:90,method:'Muñeca digital',comment:'Primera medición'},
  {id:2,date:'2026-06-10',time:'14:40',sys:162,dia:104,method:'Manual',comment:'Nerviosa'},
  {id:3,date:'2026-06-10',time:'14:45',sys:132,dia:82,method:'Manual',comment:'Después de relajarte'},
  {id:4,date:'2026-06-10',time:'18:58',sys:107,dia:74,method:'Nebucor brazo',comment:'En reposo'},
  {id:5,date:'2026-06-11',time:'09:00',sys:144,dia:91,method:'Brazalete (antidoping)',comment:'Primera toma'},
  {id:6,date:'2026-06-11',time:'09:05',sys:128,dia:91,method:'Brazalete (antidoping)',comment:'Después de respirar'},
  {id:7,date:'2026-06-11',time:'14:00',sys:115,dia:78,method:'Brazalete',comment:'Después de aspirina 500 mg'},
];

const INITIAL_LIQ = [
  {id:1,date:'2026-06-11',toma:1,type:'agua_splash',ml:450},
  {id:2,date:'2026-06-11',toma:2,type:'agua',ml:450},
  {id:3,date:'2026-06-11',toma:3,type:'cafe',ml:240},
  {id:4,date:'2026-06-11',toma:4,type:'cafe',ml:240},
  {id:5,date:'2026-06-11',toma:5,type:'refresco',ml:240},
  {id:6,date:'2026-06-11',toma:6,type:'cerveza',ml:660},
  {id:7,date:'2026-06-12',toma:1,type:'proteina',ml:240},
  {id:8,date:'2026-06-12',toma:2,type:'agua',ml:500},
  {id:9,date:'2026-06-12',toma:3,type:'refresco',ml:240},
  {id:10,date:'2026-06-12',toma:4,type:'agua',ml:240},
];

function loadBP() {
  const r = localStorage.getItem(BP_KEY);
  return r ? JSON.parse(r) : [];
}
function saveBPLocal(d) { localStorage.setItem(BP_KEY, JSON.stringify(d)); }
function loadLiq() {
  const r = localStorage.getItem(LIQ_KEY);
  return r ? JSON.parse(r) : [];
}
function saveLiqLocal(d) { localStorage.setItem(LIQ_KEY, JSON.stringify(d)); }

function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function setSyncing(on) {
  const icon = document.getElementById('sync-icon');
  const btn = document.getElementById('sync-btn');
  icon.textContent = on ? '🔄' : '☁️';
  icon.className = 'sync-icon' + (on ? ' spinning' : '');
  btn.disabled = on;
}

// Merge two arrays by id, preferring the one with higher id (most recent)
function mergeById(local, remote) {
  const map = {};
  // Put local first
  local.forEach(r => map[r.id] = r);
  // Remote fills in missing ids (adds records from other device)
  remote.forEach(r => { if (!map[r.id]) map[r.id] = r; });
  return Object.values(map).sort((a,b) => a.id - b.id);
}

function parseSheetDate(val) {
  // Google Sheets serial date: days since Dec 30, 1899
  if (!isNaN(Number(val)) && Number(val) > 1000) {
    const d = new Date((Number(val) - 25569) * 86400000);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  return String(val);
}

function rowsToBP(rows) {
  return rows.filter(r => r.length >= 7 && r[0] !== '' && !isNaN(Number(r[0]))).map(r => ({
    id: Number(r[0]),
    date: parseSheetDate(r[1]),
    time: String(r[2]),
    sys: Number(r[3]),
    dia: Number(r[4]),
    method: String(r[5]),
    comment: String(r[6] || '')
  }));
}

function rowsToLiq(rows) {
  return rows.filter(r => r.length >= 5 && r[0] !== '' && !isNaN(Number(r[0]))).map(r => ({
    id: Number(r[0]),
    date: parseSheetDate(r[1]),
    toma: Number(r[2]),
    type: String(r[3]),
    ml: Number(r[4])
  }));
}

async function pushSheet(sheetName, data, keys) {
  const rows = data.map(r => keys.map(k => r[k]));
  const url = `${SCRIPT_URL}?action=write&sheet=${sheetName}&data=${encodeURIComponent(JSON.stringify(rows))}`;
  await fetch(url);
}

async function pullSheet(sheetName) {
  const url = `${SCRIPT_URL}?action=read&sheet=${sheetName}`;
  const resp = await fetch(url);
  const rows = await resp.json();
  return Array.isArray(rows) ? rows : [];
}

const BP_KEYS = ['id','date','time','sys','dia','method','comment'];
const LIQ_KEYS = ['id','date','toma','type','ml'];

async function syncAll() {
  setSyncing(true);
  showToast('Sincronizando...', 60000);
  try {
    // 1. Pull from Sheets
    const bpRows = await pullSheet('presion');
    const liqRows = await pullSheet('liquidos');

    // 2. Convert rows to objects
    const remoteBP = rowsToBP(bpRows);
    const remoteLiq = rowsToLiq(liqRows);

    // 3. Merge local + remote (keeps all records from both devices)
    const localBP = loadBP();
    const localLiq = loadLiq();

    const mergedBP = mergeById(localBP, remoteBP);
    const mergedLiq = mergeById(localLiq, remoteLiq);

    // 4. Save merged data locally
    saveBPLocal(mergedBP);
    saveLiqLocal(mergedLiq);

    // 5. Push merged data back to Sheets
    await pushSheet('presion', mergedBP, BP_KEYS);
    await pushSheet('liquidos', mergedLiq, LIQ_KEYS);

    renderBP();
    renderLiq();
    updateHeader();
    showToast('✅ Sincronizado correctamente');
  } catch(e) {
    showToast('❌ Error al sincronizar. Revisa tu conexión.');
  }
  setSyncing(false);
}

function classify(sys, dia) {
  if (sys >= 140 || dia >= 90) return {label:'Alta', cls:'danger', color:'var(--red)'};
  if (sys >= 130 || dia >= 80) return {label:'Elevada', cls:'warning', color:'var(--orange)'};
  if (sys < 90 || dia < 60)   return {label:'Baja', cls:'info', color:'var(--blue)'};
  return {label:'Normal', cls:'ok', color:'var(--green)'};
}

function fmtDate(d) {
  const [y,m,day] = d.split('-');
  const months=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(day)} ${months[parseInt(m)]}`;
}
function fmtDateLong(d) {
  const [y,m,day] = d.split('-');
  const months=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const today = new Date().toISOString().split('T')[0];
  const yest = new Date(Date.now()-86400000).toISOString().split('T')[0];
  if (d===today) return 'Hoy';
  if (d===yest) return 'Ayer';
  return `${parseInt(day)} de ${months[parseInt(m)]}`;
}

let currentPage = 'presion';
let liqDay = new Date().toISOString().split('T')[0];

function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if (p==='presion') renderBP();
  if (p==='liquidos') renderLiq();
}

function updateHeader() {
  const bp = loadBP();
  const last = [...bp].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time))[0];
  document.getElementById('header-sub').textContent = last ? `Última medición: ${fmtDate(last.date)} ${last.time}` : 'Sin registros aún';
}

function renderBP() {
  const data = loadBP();
  const today = new Date().toISOString().split('T')[0];
  const todayR = data.filter(r => r.date===today);
  const avgSys = todayR.length ? Math.round(todayR.reduce((s,r)=>s+r.sys,0)/todayR.length) : null;
  const avgDia = todayR.length ? Math.round(todayR.reduce((s,r)=>s+r.dia,0)/todayR.length) : null;
  const maxSys = data.length ? Math.max(...data.map(r=>r.sys)) : null;
  const st = avgSys ? classify(avgSys,avgDia) : null;

  document.getElementById('bp-summary').innerHTML = `
    <div class="stat"><div class="stat-label">Promedio hoy</div><div class="stat-val ${st?st.cls:'neutral'}">${avgSys?avgSys+'/'+avgDia:'—'}</div></div>
    <div class="stat"><div class="stat-label">Máxima</div><div class="stat-val danger">${maxSys??'—'}</div></div>
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val neutral">${data.length}</div></div>`;

  const sorted = [...data].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  const container = document.getElementById('bp-records');
  container.innerHTML = '';
  if (!sorted.length) { container.innerHTML='<div class="empty-state">Sin registros aún.<br>Toca + para agregar.</div>'; return; }

  let lastDate = null;
  sorted.forEach(r => {
    if (r.date!==lastDate) {
      const div=document.createElement('div'); div.className='date-divider'; div.textContent=fmtDateLong(r.date);
      container.appendChild(div); lastDate=r.date;
    }
    const st=classify(r.sys,r.dia);
    const wrap=document.createElement('div'); wrap.className='records';
    wrap.innerHTML=`<div class="record-card">
      <div>
        <div class="record-pressure" style="color:${st.color}">${r.sys}/${r.dia}<span>mmHg</span></div>
        <div class="record-meta">🕐 ${r.time} · ${r.method}</div>
        ${r.comment?`<div class="record-comment">${r.comment}</div>`:''}
      </div>
      <div class="record-right">
        <span class="badge badge-${st.cls}">${st.label}</span>
        <button class="btn-delete" onclick="deleteBP(${r.id})">✕</button>
      </div>
    </div>`;
    container.appendChild(wrap);
  });
}

function deleteBP(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  saveBPLocal(loadBP().filter(r=>r.id!==id));
  renderBP(); updateHeader();
}

function changeDay(dir) {
  const d=new Date(liqDay+'T12:00:00'); d.setDate(d.getDate()+dir);
  const nd=d.toISOString().split('T')[0];
  if (dir>0 && nd>new Date().toISOString().split('T')[0]) return;
  liqDay=nd; renderLiq();
}

function renderLiq() {
  const data=loadLiq();
  const dayData=data.filter(r=>r.date===liqDay).sort((a,b)=>a.toma-b.toma);
  const totalMl=dayData.reduce((s,r)=>s+r.ml,0);
  const totalEq=dayData.reduce((s,r)=>s+Math.round(r.ml*HYDRO[r.type]),0);
  const pct=Math.min(totalEq/2000,1);
  const color=pct>=0.75?'var(--green)':pct>=0.5?'var(--orange)':'var(--red)';

  document.getElementById('liq-date-label').textContent=fmtDateLong(liqDay);
  document.getElementById('liq-summary').innerHTML=`
    <div class="liq-stat">
      <div class="liq-stat-label">Total tomado</div>
      <div class="liq-stat-val neutral">${totalMl.toLocaleString()} ml</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.min(totalMl/2000*100,100)}%;background:var(--blue)"></div></div>
    </div>
    <div class="liq-stat">
      <div class="liq-stat-label">Hidratación real</div>
      <div class="liq-stat-val" style="color:${color}">${totalEq.toLocaleString()} ml</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:2px">de 2,000 recomendados</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct*100}%;background:${color}"></div></div>
    </div>`;

  const container=document.getElementById('liq-records');
  container.innerHTML='';
  if (!dayData.length) { container.innerHTML='<div class="empty-state">Sin registros para este día.<br>Toca + para agregar.</div>'; return; }

  dayData.forEach(r => {
    const eq=Math.round(r.ml*HYDRO[r.type]);
    const pctBar=HYDRO[r.type];
    const barColor=pctBar>=0.85?'var(--green)':pctBar>=0.7?'var(--orange)':'var(--red)';
    const card=document.createElement('div'); card.className='toma-card';
    card.innerHTML=`
      <div>
        <div class="toma-name">${HYDRO_LABEL[r.type]}</div>
        <div class="toma-num">Toma ${r.toma}</div>
      </div>
      <div style="text-align:right">
        <div class="toma-ml">${r.ml} ml</div>
        <div class="toma-eq">≈ ${eq} ml agua</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pctBar*100}%;background:${barColor}"></div></div>
      </div>`;
    container.appendChild(card);
  });
}

function openModal() {
  const now=new Date();
  const today=now.toISOString().split('T')[0];
  const time=now.toTimeString().slice(0,5);
  if (currentPage==='presion') {
    document.getElementById('bp-date').value=today;
    document.getElementById('bp-time').value=time;
    document.getElementById('bp-sys').value='';
    document.getElementById('bp-dia').value='';
    document.getElementById('bp-comment').value='';
    document.getElementById('modal-bp').classList.add('open');
    setTimeout(()=>document.getElementById('bp-sys').focus(),300);
  } else {
    const liqData=loadLiq();
    const dayTomas=liqData.filter(r=>r.date===liqDay);
    const nextToma=dayTomas.length?Math.max(...dayTomas.map(r=>r.toma))+1:1;
    document.getElementById('liq-date-input').value=liqDay;
    document.getElementById('liq-toma').value=nextToma;
    document.getElementById('liq-ml').value='';
    document.getElementById('modal-liq').classList.add('open');
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleOverlay(e,id) { if (e.target===document.getElementById(id)) closeModal(id); }

function saveBP() {
  const date=document.getElementById('bp-date').value;
  const time=document.getElementById('bp-time').value;
  const sys=parseInt(document.getElementById('bp-sys').value);
  const dia=parseInt(document.getElementById('bp-dia').value);
  const method=document.getElementById('bp-method').value;
  const comment=document.getElementById('bp-comment').value.trim();
  if (!date||!time||isNaN(sys)||isNaN(dia)||sys<50||dia<30) { alert('Por favor ingresa todos los datos correctamente.'); return; }
  const data=loadBP();
  const newId=data.length?Math.max(...data.map(r=>r.id))+1:1;
  data.push({id:newId,date,time,sys,dia,method,comment});
  saveBPLocal(data);
  closeModal('modal-bp');
  renderBP(); updateHeader();
  showToast('Guardado ✓ — toca ☁️ para sincronizar');
}

function saveLiq() {
  const date=document.getElementById('liq-date-input').value;
  const toma=parseInt(document.getElementById('liq-toma').value);
  const type=document.getElementById('liq-type').value;
  const ml=parseInt(document.getElementById('liq-ml').value);
  if (!date||isNaN(toma)||isNaN(ml)||ml<=0) { alert('Por favor llena todos los campos.'); return; }
  const data=loadLiq();
  const newId=data.length?Math.max(...data.map(r=>r.id))+1:1;
  data.push({id:newId,date,toma,type,ml});
  saveLiqLocal(data);
  liqDay=date;
  closeModal('modal-liq');
  renderLiq();
  showToast('Guardado ✓ — toca ☁️ para sincronizar');
}

renderBP(); renderLiq(); updateHeader();
</script>
</body>
</html>
